# TRex test configuration

# TRex server
server = "127.0.0.1"

# Forward direction (port 0 → port 1)
src-mac = "12:00:00:00:11:11"
dst-mac = "12:00:00:ab:cd:ff"
src-ip = "192.0.1.1"
dst-ip = "192.0.2.250"
src-ips = 1
dst-ips = 1
src-port = 4501
dst-port = 5201
src-ports = 1
dst-ports = 1

# Reverse direction (port 1 → port 0)
# Used with --bidir or --rev
rev-dst-mac = "12:00:00:dc:bc:ff"
rev-src-mac = "12:11:00:00:11:11"
# rev-src-ip = ""  # default: dst-ip
rev-dst-ip = "192.0.1.250"

# Test parameters
frame-sizes = [1440]
duration = 30
runs = 5
results-file = "u1.json"
priming = false
stats = false

# Direction (mutually exclusive)
bidir = true
# rev = false  # Reverse only (port 1 → port 0)

# Rate (mutually exclusive)
# pps = ""  # Packets per second
# throughput = ""  # Target throughput: G for Gbps, M for Mbps, e.g. 10G, 500M

# Flow range
flows-start = 1
flows-end = 1

